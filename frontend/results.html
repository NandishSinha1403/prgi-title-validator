<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Report - PRGI Validator</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div id="confettiBox" class="confetti-container hidden"></div>

    <nav class="navbar">
        <a href="index.html" class="nav-brand">PRGI Validator</a>
        <a href="http://127.0.0.1:8000/docs" class="nav-link" target="_blank">API Docs</a>
    </nav>

    <div class="container">
        <div id="loader" class="loader-container fade-in">
            <div class="pulse"></div>
            <h3 style="color: var(--text-color);">Analyzing Title...</h3>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Running phonetic, fuzzy, and compliance checks</p>
        </div>
        
        <main id="resultsContent" class="hidden fade-in">
            <div class="submitted-title-box">
                <h2 id="submittedTitle"></h2>
                <span style="color: var(--text-muted); font-size: 0.9rem;">Target Title</span>
            </div>

            <div id="statusBanner" class="banner hidden"></div>

            <div class="gauge-container">
                <div class="gauge" id="probabilityGauge" style="--value: 0%;">
                    <div class="gauge-content">
                        <div class="gauge-value" id="probabilityValue">0%</div>
                        <div class="gauge-label">Approval Probability</div>
                    </div>
                </div>
            </div>

            <div id="reasonsContainer" class="hidden" style="margin-bottom: 2rem;">
                <h3 class="section-title">Compliance Issues</h3>
                <div class="reasons-list" id="reasonsList"></div>
            </div>

            <div id="similarContainer" class="hidden">
                <h3 class="section-title">Top Similar Existing Titles</h3>
                <div class="similar-list" id="similarList"></div>
            </div>

            <div class="actions">
                <a href="submit.html" class="btn btn-secondary">Analyze Another Title</a>
            </div>
        </main>
    </div>
    <script src="assets/app.js"></script>
</body>
</html>
