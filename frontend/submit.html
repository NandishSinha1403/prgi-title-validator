<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Title - PRGI Validator</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">PRGI Validator</a>
        <a href="http://127.0.0.1:8000/docs" class="nav-link" target="_blank">API Docs</a>
    </nav>

    <div class="container fade-in">
        <header style="text-align: center; margin-bottom: 1rem;">
            <h1>Check Title Availability</h1>
            <p style="color: var(--text-muted);">Enter your proposed publication name below</p>
        </header>

        <main>
            <div class="form-card">
                <form id="titleForm">
                    <div class="form-group">
                        <div class="input-wrapper">
                            <input type="text" id="titleInput" placeholder="e.g., The Daily News" required autocomplete="off">
                        </div>
                        <span class="char-count" id="charCount">0/100</span>
                    </div>
                    
                    <button type="submit" class="btn btn-large" style="width: 100%;" id="submitBtn">
                        <span class="btn-text">Analyze Title</span>
                        <div class="spinner"></div>
                    </button>
                </form>
                
                <div class="chips-container" id="chipContainer">
                    <span style="color: var(--text-muted); font-size: 0.85rem; width: 100%; text-align: center; margin-bottom: 0.5rem;">Try an example:</span>
                    <div class="chip">Dainik Samachar</div>
                    <div class="chip">India Times</div>
                    <div class="chip">Jan Jagran Daily</div>
                </div>

                <div id="errorMsg" style="color: var(--error-color); margin-top: 1rem; text-align: center; display: none;"></div>
            </div>
        </main>
    </div>
    <script src="assets/app.js"></script>
</body>
</html>
