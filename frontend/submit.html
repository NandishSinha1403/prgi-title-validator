<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Title - PRGI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Check Title Availability</h1>
        </header>
        <main>
            <form id="titleForm">
                <div class="form-group">
                    <input type="text" id="titleInput" placeholder="Enter proposed title (e.g., The Daily News)" required autocomplete="off">
                    <span class="char-count" id="charCount">0/100</span>
                </div>
                <button type="submit" class="btn btn-large" style="width: 100%;">Analyze Title</button>
            </form>
            <div id="errorMsg" style="color: var(--error-color); margin-top: 1rem; text-align: center; display: none;"></div>
        </main>
    </div>
    <script src="assets/app.js"></script>
</body>
</html>
